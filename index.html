<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>현듀생일</title>
    <link rel="stylesheet" href="style.css">
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css"
/>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>HAPPY BIRTHDAY</h1>
        </div>
        <div class="content">
            <p>현듀의 생일선물이 준비완료되었습니다.<br>선물을 받으시겠습니까?</p>
            <button id="runaway-btn">
                <span>선물받기</span>
            </button>
        </div>
        <div class="hd_img01">
            <img src="imgs/img01.png" alt="현듀"/>
        </div>
        <div class="hd_img02">
            <img src="imgs/img02.png" alt="현듀"/>
        </div>
        <div class="icon heart01">
          <img src="imgs/heart01.svg" alt="하투"/>
        </div>
        <div class="icon heart02">
          <img src="imgs/heart02.svg" alt="하투"/>
        </div>
        <div class="icon heart03">
          <img src="imgs/heart03.svg" alt="하투"/>
        </div>
        <div class="icon day">
          <img src="imgs/day.svg" alt="하투"/>
        </div>
    </div>
    <div id="birthday-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>선물의 위치는???</h2>
            <p>현듀님 책상 왼쪽 아래에 있어용!!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
